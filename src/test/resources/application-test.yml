spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:smart_consult;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  ai:
    dashscope:
      api-key: test-key
app:
  jwt:
    secret: test-smart-consult-development-jwt-secret-with-256-bits
    expires-in-seconds: 604800
  sms:
    code-expires-in-seconds: 300
    mock-enabled: true
