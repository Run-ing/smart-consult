spring:
  application:
    name: smart-consult
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/smart_consult?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus
server:
  port: 8080
  servlet:
    context-path: /api
# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.example.smartconsult.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
app:
  demo:
    dashscope:
      enabled: ${APP_DEMO_DASHSCOPE_ENABLED:false}
  jwt:
    secret: ${APP_JWT_SECRET:smart-consult-development-jwt-secret-change-before-production}
    expires-in-seconds: ${APP_JWT_EXPIRES_IN_SECONDS:604800}
  sms:
    code-expires-in-seconds: ${APP_SMS_CODE_EXPIRES_IN_SECONDS:300}
    mock-enabled: ${APP_SMS_MOCK_ENABLED:true}
